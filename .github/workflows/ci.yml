name: CI

on:
  push:
    branches: [main]
    paths:
      - 'napkin-notes/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'napkin-notes/**'
      - '.github/workflows/ci.yml'

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run API tests
        working-directory: napkin-notes/services/api
        run: go test ./...

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: napkin-notes/web/package-lock.json
      - name: Install dependencies
        working-directory: napkin-notes/web
        run: npm ci
      - name: Run tests
        working-directory: napkin-notes/web
        run: npm run test

  test-fontforge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: napkin-notes/services/fontforge
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: napkin-notes/services/fontforge
        run: python -m pytest tests/ -v

  e2e:
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start application stack
        run: docker compose -f napkin-notes/docker/docker-compose.dev.yml up --build -d
      - name: Install E2E dependencies
        working-directory: napkin-notes/e2e
        run: npm ci
      - name: Install Playwright browsers
        working-directory: napkin-notes/e2e
        run: npx playwright install --with-deps chromium
      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost > /dev/null && break
            sleep 2
          done
      - name: Run E2E tests
        working-directory: napkin-notes/e2e
        run: npx playwright test
      - name: Stop application stack
        if: always()
        run: docker compose -f napkin-notes/docker/docker-compose.dev.yml down

  deploy:
    runs-on: ubuntu-latest
    needs: [test-api, test-web, test-fontforge, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/napkin-notes
            git pull origin main
            cd napkin-notes/docker
            docker compose up -d --build
            docker image prune -f
